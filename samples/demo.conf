# ==================================================================
#  HOCON plugin — feature playground.  Open this in the sandbox IDE.
#  Both '#' and '//' start a comment.  Each section says what to try.
#
#  Quick checklist:
#   - Highlighting: colors below should distinguish keys/strings/numbers/etc.
#   - Folding:      gutter arrows on { }, [ ] and the """ block.
#   - Brace match:  place caret next to { } [ ] or ${ }.
#   - Structure:    Alt+7 (Structure) / breadcrumbs at the bottom.
#   - Reformat:     Ctrl+Alt+L (Cmd+Alt+L) — see the "messy" section.
#   - Move entry:   Ctrl+Shift+Up/Down on a line inside an object.
# ==================================================================

// --- Literals & highlighting ------------------------------------
app {
  name = "hocon-demo"          # quoted string
  version = 1.4                # number
  enabled = true               # boolean
  missing = null               # null keyword
  unquoted = plain-value       # unquoted string
  port: 8080                  # ':' works as a separator too
}

// --- Path prefixes: a.b.c desugars to nested objects ------------
server.http.host = "localhost"
server.http.port = 8080

// --- Include (Ctrl+Click / Ctrl+B the path to jump to the file) -
include "included.conf"

// --- Substitutions ----------------------------------------------
// Ctrl+Click 'app.name' to go to its declaration.
// Put the caret on the 'name' key inside 'app' -> Find Usages (Alt+F7)
// and Rename (Shift+F6) update this reference too.
title = ${app.name}

// Concatenation: quoted parts + substitutions on one line.
url = "http://"${server.http.host}":"${server.http.port}

// Resolves into the included file:
timeout = ${shared.timeout}

// Optional substitution -> intentionally NOT reported as unresolved:
optional = ${?feature.flags.beta}

// --- Merge semantics: 'database' declared twice, objects merge --
database {
  host = "db.local"
}
database {
  port = 5432
}
// Both halves resolve thanks to merging:
jdbc = "jdbc:pg://"${database.host}":"${database.port}"/app"

// --- Arrays and '+=' append -------------------------------------
tags = [alpha, beta, gamma]
tags += delta

matrix = [
  [1, 2, 3]
  [4, 5, 6]
]

// --- Multiline string -------------------------------------------
// Language injection: put the caret inside, press Alt+Enter ->
// "Inject language or reference" -> pick JSON to get JSON support here.
payload = """
{
  "id": 1,
  "name": "demo"
}
"""

// --- Quick documentation ----------------------------------------
// Hover (or Ctrl+Q / F1) over 'maxConnections' — the comment above it,
// its value and full path 'pool.maxConnections' show up.
// Copy Reference (Ctrl+Alt+Shift+C) on it copies 'pool.maxConnections'.
pool {
  # Maximum number of pooled connections.
  maxConnections = 20
}

// --- Completion (Ctrl+Space) ------------------------------------
// Inside the braces below, type after the dot:  ${server.http.
// -> 'host' and 'port' are offered.  In a value position type 'tr'
// -> 'true' is offered.  On a new key line inside an object with a
// schema provider installed, known keys would be offered too.
completionDemo = ${server.http.host}

// --- Inspections ------------------------------------------------
// 1) Unresolved substitution: 'app' exists but 'app.nope' doesn't -> weak warning;
//    Alt+Enter -> "Make substitution optional". A path rooted at an unknown key
//    (e.g. ${ENV}) is intentionally NOT flagged — it usually comes from the environment.
brokenRef = ${app.nope}

// 2) Unresolved include: reported because the file is missing.
include "no-such-file.conf"

// 3) Overridden (duplicate) key: the first 'retries' is greyed out
//    because the second one wins.
retries = 1
retries = ${ENV}

// --- Formatter demo (run Ctrl+Alt+L to clean this up) -----------
messy = [1, 2, 3]
nested {
  a = 1
  b = 2
}
