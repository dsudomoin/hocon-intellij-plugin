name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, release & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      # Publish to the JetBrains Marketplace only when a PUBLISH_TOKEN secret is configured,
      # so tagging a release never fails just because the token isn't set up yet.
      - name: Publish to JetBrains Marketplace
        if: ${{ env.PUBLISH_TOKEN != '' }}
        run: ./gradlew publishPlugin
