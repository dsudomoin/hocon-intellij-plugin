name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, release & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # The tag is the single source of truth for the released version: gradle.properties keeps a
      # -SNAPSHOT version for local builds, so a release must never silently fall back to it.
      - name: Resolve version from the tag
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "::error::A release must run on a tag, got $GITHUB_REF_TYPE '$GITHUB_REF_NAME'."
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "::error::Tag '$GITHUB_REF_NAME' is not v<major>.<minor>.<patch>."; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build plugin distribution
        run: ./gradlew buildPlugin -Pversion=${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      # Publish to the JetBrains Marketplace only when a PUBLISH_TOKEN secret is configured,
      # so tagging a release never fails just because the token isn't set up yet.
      - name: Publish to JetBrains Marketplace
        if: ${{ env.PUBLISH_TOKEN != '' }}
        run: ./gradlew publishPlugin -Pversion=${{ steps.version.outputs.version }}
